name: Build NoEscape

on:
  push:
    branches: [ "**" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew (if present)
        run: chmod +x ./gradlew || true

      - name: Build with Gradle
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew build --no-daemon
          else
            gradle build --no-daemon
          fi

      - name: Upload noescape.jar
        uses: actions/upload-artifact@v4
        with:
          name: noescape-jar
          path: build/libs/noescape.jar
